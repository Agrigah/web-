<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Nombre Premier</title>
</head>
<body>
    <script>
        function estPremier(n) {
            if (n < 2) return false; // 0 et 1 ne sont pas premiers

            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) {
                    return i; // retourne le diviseur si n n'est pas premier
                }
            }
            return true; // si aucun diviseur trouvé, c'est premier
        }

        let nombre = 12;

        if (isNaN(nombre) || nombre <= 0) {
            console.log("Veuillez entrer un entier positif valide !");
        } else {
            let resultat = estPremier(nombre);
            if (resultat === true) {
                console.log(nombre + " est un nombre premier");
            } else {
                console.log(nombre + " n'est pas un nombre premier, il est divisible par " + resultat);
            }
        }
    </script>
</body>
</html>
