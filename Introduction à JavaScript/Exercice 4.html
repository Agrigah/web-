<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyramide</title>
</head>
<body>
    <script>
        function pyramide(taille) {
            for (let i = 1; i <= taille; i++) {
                let ligne = "";

                for (let j = 1; j <= taille - i; j++) {
                    ligne += " ";
                }

                for (let k = 1; k <= 2 * i - 1; k++) {
                    ligne += "*";
                }
                console.log(ligne);
            }
        }

        let taille = 5;
        pyramide(taille);
    </script>
</body>
</html>
