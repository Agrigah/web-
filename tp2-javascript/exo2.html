<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculatrice Simple</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 30px;
    background: #fff;
    color: #000;
  }
  h2 {
    margin-bottom: 12px;
  }
  .cadre {
    border: 2px solid #5b9db5;
    padding: 20px;
    display: inline-block;
    background: #fff;
  }
  input[type="text"], input[type="number"] {
    display: block;
    margin-bottom: 8px;
    padding: 4px 6px;
    width: 160px;
    border: 1px solid #aaa;
    font-size: 14px;
  }
  .boutons {
    margin-bottom: 8px;
  }
  button {
    padding: 4px 10px;
    font-size: 14px;
    cursor: pointer;
    background: #e9e9e9;
    border: 1px solid #aaa;
    margin-right: 4px;
  }
  button:hover {
    background: #d0d0d0;
  }
  #resultat {
    background: #f5f5f5;
  }
</style>
</head>
<body>
  <h2>Exercice 2 : Calculatrice Simple</h2>

  <div class="cadre">
    <input type="number" id="n1" placeholder="Nombre 1">
    <input type="number" id="n2" placeholder="Nombre 2">
    <div class="boutons">
      <button onclick="calculer('+')">+</button>
      <button onclick="calculer('-')">-</button>
      <button onclick="calculer('*')">*</button>
      <button onclick="calculer('/')">/</button>
    </div>
    <input type="text" id="resultat" placeholder="Résultat" readonly>
  </div>

  <script>
    function calculer(op) {
      var n1 = parseFloat(document.getElementById('n1').value);
      var n2 = parseFloat(document.getElementById('n2').value);
      var res = document.getElementById('resultat');

      if (isNaN(n1) || isNaN(n2)) {
        res.value = 'Saisir deux nombres';
        return;
      }
      if (op === '/' && n2 === 0) {
        res.value = 'Division par zéro !';
        return;
      }

      var r;
      if (op === '+') r = n1 + n2;
      else if (op === '-') r = n1 - n2;
      else if (op === '*') r = n1 * n2;
      else if (op === '/') r = n1 / n2;

      res.value = r;
    }
  </script>
</body>
</html>
