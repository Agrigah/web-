<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Permutation</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 30px;
    background: #fff;
    color: #000;
  }
  h2 {
    margin-bottom: 12px;
  }
  .cadre {
    border: 2px solid #5b9db5;
    padding: 20px;
    display: inline-block;
    background: #fff;
  }
  input[type="text"] {
    display: block;
    margin-bottom: 8px;
    padding: 4px 6px;
    width: 160px;
    border: 1px solid #aaa;
    font-size: 14px;
  }
  button {
    padding: 4px 14px;
    font-size: 14px;
    cursor: pointer;
    background: #e9e9e9;
    border: 1px solid #aaa;
  }
  button:hover {
    background: #d0d0d0;
  }
</style>
</head>
<body>
  <h2>Exercice 1 : Permutation</h2>

  <div class="cadre">
    <input type="text" id="a" value="Texte 1">
    <input type="text" id="b" value="Texte 2">
    <button onclick="permuter()">Permuter</button>
  </div>

  <script>
    function permuter() {
      var a = document.getElementById('a');
      var b = document.getElementById('b');
      var tmp = a.value;
      a.value = b.value;
      b.value = tmp;
    }
  </script>
</body>
</html>
