<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Calculatrice - Select</title>
</head>
<body>

    <h3>Avec liste déroulante :</h3>

    <form onsubmit="calculer(); return false;">

       
        <label for="op1">Premier nombre :</label>
        <input type="number" id="op1" name="op1" required>

     
        <label for="operation">Opération :</label>
        <select id="operation" name="operation" required>
            <option value="+">Addition (+)</option>
            <option value="-">Soustraction (-)</option>
            <option value="*">Multiplication (*)</option>
            <option value="/">Division (/)</option>
        </select>

       
        <label for="op2">Deuxième nombre :</label>
        <input type="number" id="op2" name="op2" required>

        <br><br>
        <button type="submit">Envoyer</button>

    </form>

    <h4>Résultat : <span id="resultat"></span></h4>

    <script>
        function calculer() {

            let op1 = parseFloat(document.getElementById("op1").value);
            let op2 = parseFloat(document.getElementById("op2").value);
            let operation = document.getElementById("operation").value;
            let resultat;

            switch (operation) {
                case "+":
                    resultat = op1 + op2;
                    break;
                case "-":
                    resultat = op1 - op2;
                    break;
                case "*":
                    resultat = op1 * op2;
                    break;
                case "/":
                    resultat = op2 !== 0 ? op1 / op2 : "Division par zéro impossible";
                    break;
            }

            document.getElementById("resultat").textContent = resultat;
        }
    </script>

</body>
</html>
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice </title>
</head>
<body>

    <h3>Avec boutons radios :</h3>

    <form onsubmit="calculRadio(); return false;">
        <label for="op1_radio">Opérande 1:</label>
        <input type="number" id="op1_radio" required>

        <label>Opération:</label>
        <label><input type="radio" name="operation_radio" value="+" required> +</label>
        <label><input type="radio" name="operation_radio" value="-"> -</label>
        <label><input type="radio" name="operation_radio" value="*"> *</label>
        <label><input type="radio" name="operation_radio" value="/"> /</label>

        <label for="op2_radio">Opérande 2:</label>
        <input type="number" id="op2_radio" required>

        <br><br>
        <button type="submit">Envoyer</button>
    </form>

    <p>Résultat : <span id="resultat_radio"></span></p>

    <script>
        function calculRadio() {
            let op1 = parseFloat(document.getElementById("op1_radio").value);
            let op2 = parseFloat(document.getElementById("op2_radio").value);
            let operation = document.querySelector('input[name="operation_radio"]:checked').value;
            let resultat;

            switch(operation) {
                case "+": resultat = op1 + op2; break;
                case "-": resultat = op1 - op2; break;
                case "*": resultat = op1 * op2; break;
                case "/": 
                    resultat = op2 !== 0 ? op1 / op2 : "Division par zéro impossible";
                    break;
            }

            document.getElementById("resultat_radio").textContent = resultat;
        }
    </script>

</body>
</html>
